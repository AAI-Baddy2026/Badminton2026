/* ============================================================
   AAI Badminton Tournament 2026 — Stylesheet (redesigned)
   Modern, responsive, mobile-friendly. Brand blue #1F4E78.
   All original class names are preserved for JS compatibility;
   new classes are added for vacant slots, unpaired chips,
   the mode banner and the admin login bar.
   ============================================================ */
:root{
  --brand:#1F4E78; --brand-dark:#163759; --brand-2:#2E75B6;
  --bg:#eef1f6; --panel:#ffffff; --line:#e3e7ee; --ink:#1f2937;
  --muted:#6b7280; --ok:#16a34a; --warn:#c2410c; --danger:#ef4444;
  --vacant:#fff7ed; --vacant-line:#fdba74; --chip:#eef5ff;
  --radius:12px; --shadow:0 1px 3px rgba(16,32,64,.08),0 1px 2px rgba(16,32,64,.04);
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;}
#app{max-width:1400px;margin:0 auto;padding:0 16px 72px;}

/* ---------- Top bar ---------- */
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:14px 24px;background:linear-gradient(180deg,#fff, #fbfcfe);
  border-bottom:1px solid var(--line);margin:0 -16px 0;box-shadow:var(--shadow);flex-wrap:wrap;}
.topbar h1{font-size:19px;margin:0;color:var(--brand);display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px;}
.topbar h1 .logo{display:inline-flex;width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;align-items:center;justify-content:center;font-size:16px;}
.topbar h1 .exl-logo{display:inline-flex;align-items:center;}
.topbar h1 .exl-logo .exl-svg{height:26px;width:auto;display:block;}
.brand-sep{display:inline-block;width:1px;height:24px;background:var(--line);}
.topactions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* ---------- Mode banner (Admin vs Viewer) ---------- */
.mode-banner{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin:14px 0 4px;padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;}
.mode-banner .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.mode-admin{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;}
.mode-admin .dot{background:var(--ok);box-shadow:0 0 0 3px rgba(22,163,74,.18);}
.mode-view{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.mode-view .dot{background:var(--brand-2);box-shadow:0 0 0 3px rgba(46,117,182,.18);}
.mode-banner .spacer{flex:1;}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:6px;margin:14px 0;flex-wrap:wrap;}
.tab{padding:9px 16px;background:#fff;border:1px solid var(--line);border-radius:999px;cursor:pointer;font-size:14px;color:#374151;transition:all .15s;}
.tab:hover{background:#f4f7fb;border-color:#cbd5e1;}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px rgba(31,78,120,.25);}

/* ---------- Panels ---------- */
.panel{background:var(--panel);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);border:1px solid var(--line);}
.panel h2{margin-top:0;color:var(--brand);font-size:19px;}
.panel h3{color:var(--brand);font-size:15px;margin-top:26px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.muted{color:var(--muted);font-size:13px;}

/* ---------- Buttons ---------- */
.btn{padding:8px 15px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;color:#374151;}
.btn:hover{background:#f4f7fb;border-color:#cbd5e1;}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark);}
.btn-success{background:var(--ok);color:#fff;border-color:var(--ok);}
.btn-success:hover{background:#15803d;}
.btn-warn{background:#f59e0b;color:#fff;border-color:#f59e0b;}
.btn-warn:hover{background:#d97706;}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-danger:hover{background:#dc2626;}
.btn-refresh{background:#0369a1;color:#fff;border-color:#0369a1;}
.btn-refresh:hover{background:#075985;}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:7px;}

/* ---------- Forms ---------- */
.addform{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 20px;padding:14px;background:#f7f9fc;border:1px solid var(--line);border-radius:var(--radius);align-items:center;}
.addform input,.addform select{padding:8px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;background:#fff;}
input,select{font-family:inherit;}

/* ---------- Tables ---------- */
.table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
.table th{background:var(--brand);color:#fff;padding:10px;text-align:left;font-weight:600;position:sticky;top:0;}
.table th:first-child{border-top-left-radius:8px;}
.table th:last-child{border-top-right-radius:8px;}
.table td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
.table tr:nth-child(even) td{background:#f8fafc;}
.table tr.pending td{background:#fffbeb;}
.table tr.done td{background:#f0fdf4;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
.ok{color:var(--ok);font-weight:600;}
.warn{color:var(--warn);font-weight:600;}
.winner{background:#c6efce !important;font-weight:600;}
.bye{color:#9ca3af;font-style:italic;}

/* ---------- Category chips (player table) ---------- */
.cat-pill{display:inline-block;padding:2px 9px;margin:1px 3px 1px 0;border-radius:999px;background:var(--chip);color:var(--brand);font-size:11px;font-weight:600;border:1px solid #d6e4ff;}
.cat-edit{display:flex;flex-wrap:wrap;gap:6px;}
.cat-edit label{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:#f4f7fb;border:1px solid var(--line);padding:3px 9px;border-radius:999px;cursor:pointer;user-select:none;}
.cat-edit label.on{background:var(--brand);color:#fff;border-color:var(--brand);}
.cat-edit input{margin:0;}

/* ---------- Settings ---------- */
.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 0;}
.settings-grid label{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#374151;font-weight:600;}
.settings-grid input{padding:8px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;}

/* ---------- Brackets ---------- */
.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.subtab{padding:7px 15px;background:#f1f5f9;border:1px solid var(--line);border-radius:999px;cursor:pointer;font-size:12px;}
.subtab.active{background:var(--brand-2);color:#fff;border-color:var(--brand-2);}
.bracket-wrap{display:flex;gap:32px;overflow-x:auto;padding:12px 0 24px;-webkit-overflow-scrolling:touch;}
.bracket-col{display:flex;flex-direction:column;gap:8px;min-width:220px;justify-content:space-around;}
.bracket-stage{font-weight:700;color:#fff;background:var(--brand-2);padding:7px 12px;border-radius:8px;text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:.4px;}
.match-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px;box-shadow:var(--shadow);}
.match-id{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.match-side{padding:5px 0;border-top:1px dashed var(--line);}
.match-side:first-of-type{border-top:none;}
.match-side.winner{background:#c6efce;padding:5px 7px;border-radius:6px;font-weight:600;}

/* ---------- Filter / action bars ---------- */
.filterbar{display:flex;gap:16px;margin:12px 0;align-items:center;flex-wrap:wrap;}
.filterbar label{display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;}
.filterbar select{padding:8px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;}
.resbtns{display:flex;gap:4px;}
.actionbar{display:flex;gap:12px;margin:16px 0;align-items:center;flex-wrap:wrap;}

/* ---------- Badges ---------- */
.badge{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;}
.badge-success{background:#c6efce;color:#166534;}
.admin-badge{display:inline-block;padding:3px 9px;background:#fef3c7;color:#92400e;border-radius:6px;font-size:11px;font-weight:600;margin-left:8px;}
.table-results td:nth-child(5),.table-results td:nth-child(6){max-width:240px;}

/* ---------- Info callouts ---------- */
.refresh-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:11px 15px;margin:12px 0;font-size:13px;color:#1e40af;}

/* ---------- Stats ---------- */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
.stat-card{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:130px;}
.stat-card .stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;}
.stat-card .stat-nums{font-size:14px;margin-top:2px;}
.stat-played{color:var(--ok);font-weight:700;}
.stat-remaining{color:var(--warn);font-weight:700;}
.stat-total{color:var(--muted);}

/* ============================================================
   DRAG-AND-DROP  (players, pairing slots, unpaired chips)
   ============================================================ */
.draggable-row{cursor:grab;}
.draggable-row:active{cursor:grabbing;}
.draggable-row.dragging{opacity:.4;background:#dbeafe !important;}
.draggable-row.drag-over{border-top:3px solid var(--brand);}
.draggable-row.drag-over-below{border-bottom:3px solid var(--brand);}
.drag-handle{cursor:grab;color:#9ca3af;font-size:16px;user-select:none;padding:0 6px;}
.drag-handle:hover{color:var(--brand);}

/* a draggable player name (in a slot or in the unpaired list) */
.drag-player{display:inline-flex;align-items:center;gap:6px;cursor:grab;padding:5px 10px;border-radius:8px;
  border:1px solid transparent;background:#f4f7fb;transition:all .15s;font-size:13px;}
.drag-player:hover{border-color:#93c5fd;background:#eaf2ff;}
.drag-player.dragging{opacity:.4;background:#dbeafe;}
.drag-player.drag-target{border-color:var(--brand);background:#dbeafe;box-shadow:0 0 0 2px rgba(31,78,120,.2);}
.drag-player::before{content:"⠿";color:#9ca3af;font-size:12px;}

/* vacant slot — clear, inviting drop target */
.slot-vacant{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:120px;
  padding:6px 12px;border-radius:8px;border:2px dashed var(--vacant-line);background:var(--vacant);
  color:#b45309;font-size:12px;font-weight:600;font-style:italic;transition:all .15s;}
.slot-vacant.drop-ok{border-color:var(--ok);background:#ecfdf5;color:#065f46;box-shadow:0 0 0 3px rgba(22,163,74,.15);}
.slot-vacant.drop-bad{border-color:var(--danger);background:#fef2f2;color:#991b1b;}

/* the Unpaired Players tray */
.unpaired{margin:10px 0 4px;padding:14px;border-radius:var(--radius);background:#f8fafc;border:1px solid var(--line);}
.unpaired h4{margin:0 0 10px;font-size:13px;color:var(--brand);font-weight:700;display:flex;align-items:center;gap:8px;}
.unpaired .count{background:var(--brand);color:#fff;border-radius:999px;padding:1px 9px;font-size:11px;}
.unpaired-list{display:flex;flex-wrap:wrap;gap:8px;}
.unpaired-empty{color:var(--muted);font-size:12px;font-style:italic;}

/* ---------- Admin login bar ---------- */
.login-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.login-bar input{padding:8px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;min-width:150px;}
.login-bar .err{color:var(--danger);font-size:12px;font-weight:600;}

/* read-only: neutralise pointer affordances on disabled controls */
.is-readonly .drag-player{cursor:default;}
.is-readonly .drag-player::before{content:"";}

/* ============================================================
   RESPONSIVE  /  MOBILE
   ============================================================ */
@media (max-width:860px){
  .settings-grid{grid-template-columns:1fr;}
  .topbar{padding:12px 16px;}
  .topbar h1{font-size:17px;}
}
@media (max-width:640px){
  #app{padding:0 10px 64px;}
  .tab{padding:8px 13px;font-size:13px;}
  .panel{padding:16px;}
  .topactions{width:100%;}
  .topactions .btn{flex:1 1 auto;text-align:center;}
  .table{font-size:12px;}
  .table th,.table td{padding:7px 7px;}
  .mode-banner{font-size:12px;padding:9px 12px;}
}
</style>

// -------------- Category & availability helpers ---------------------------
const DOUBLES_CATS = ["MD", "WD", "XD"];
function isDoublesCat(c) { return c === "MD" || c === "WD" || c === "XD"; }
function isSinglesCat(c) { return c === "MS" || c === "WS"; }
// Categories a player of a given gender is allowed to enter.
function allowedCatsFor(gender) { return gender === "Female" ? ["WS", "WD", "XD"] : ["MS", "MD", "XD"]; }
// A player's stored cats normalised to canonical codes (MS/WS/XD/MD/WD).
function playerCats(p) { return (p.cats || []).map(c => CAT_MAP[c] || c); }
// Eligible = nominated for the category AND gender-valid for it.
function eligibleFor(p, cat) {
  if (!p) return false;
  if (!playerCats(p).includes(cat)) return false;
  if ((cat === "WS" || cat === "WD") && p.gender !== "Female") return false;
  if ((cat === "MS" || cat === "MD") && p.gender !== "Male") return false;
  return true;
}
// Player IDs currently placed (non-empty slots) in a category's pairings.
function placedIds(cat) {
  const set = new Set();
  for (const t of (window.STATE.pairings[cat] || []))
    for (const pid of t) if (pid != null) set.add(pid);
  return set;
}
// Eligible-but-unplaced players for a category — drives the Unpaired pool.
function unpairedFor(cat) {
  const placed = placedIds(cat);
  return window.STATE.players.filter(p => eligibleFor(p, cat) && !placed.has(p.id));
}
// Can player p legally occupy pairings[cat][teamIdx][slot]?
function canPlace(p, cat, teamIdx, slot) {
  if (!eligibleFor(p, cat)) return false;
  const team = (window.STATE.pairings[cat] || [])[teamIdx];
  if (!team) return false;
  const otherSlot = slot === 0 ? 1 : 0;
  if (team[otherSlot] === p.id) return false;           // same player twice in a team
  if (cat === "XD" && team[otherSlot] != null) {         // mixed doubles must be 1 male + 1 female
    const op = pById(team[otherSlot]);
    if (op && op.gender === p.gender) return false;
  }
  return true;
}
// Remove a player id from EVERY pairing slot. Doubles: leave the slot vacant
// (null) so the partner and pairing record survive. Singles: drop the entrant.
// Doubles teams left fully empty are pruned.
function removePlayerFromPairings(pid) {
  for (const c of CAT_ORDER) {
    const arr = window.STATE.pairings[c];
    if (!arr) continue;
    if (isSinglesCat(c)) {
      window.STATE.pairings[c] = arr.filter(t => t[0] !== pid);
    } else {
      for (const t of arr) for (let s = 0; s < t.length; s++) if (t[s] === pid) t[s] = null;
      window.STATE.pairings[c] = arr.filter(t => t.some(x => x != null));
    }
  }
}
// Reconcile a category-nomination change WITHOUT disturbing valid placements:
//  - dropped category  -> vacate doubles slot / drop singles entrant
//  - added singles      -> append player as a new draw entrant
//  - added doubles      -> nothing; player simply appears in the Unpaired pool
function reconcileCategoryChange(p, before, after) {
  const removed = before.filter(c => !after.includes(c));
  const added = after.filter(c => !before.includes(c));
  for (const c of removed) {
    const arr = window.STATE.pairings[c];
    if (!arr) continue;
    if (isSinglesCat(c)) {
      window.STATE.pairings[c] = arr.filter(t => t[0] !== p.id);
    } else {
      for (const t of arr) for (let s = 0; s < t.length; s++) if (t[s] === p.id) t[s] = null;
      window.STATE.pairings[c] = arr.filter(t => t.some(x => x != null));
    }
  }
  for (const c of added) {
    if (!window.STATE.pairings[c]) window.STATE.pairings[c] = [];
    if (isSinglesCat(c) && eligibleFor(p, c) && !placedIds(c).has(p.id)) {
      window.STATE.pairings[c].push([p.id]);   // singles: new entrant
    }
    // doubles additions are surfaced via the Unpaired pool — no auto-pairing
  }
}

// -------------- Persistence -----------------------------------------------
function isViewerLegacyPlaceholder() { return false; }
function saveState() {
  // Only an authenticated admin persists edits. Viewers / not-yet-unlocked
  // visitors never write localStorage, so a redeploy or backend push always
  // reaches them (no stale per-browser cache shadowing the deployed data).
  if (!canEdit()) return;
  window.STATE.updatedAt = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(window.STATE));
  schedulePush();   // mirror the change to the shared backend, if one is deployed
}
function loadState() {
  // A view-only snapshot file carries its own baked state.
  if (isViewer()) return window.VIEWER_STATE ? window.VIEWER_STATE : JSON.parse(JSON.stringify(window.SEED_STATE || {}));
  // Admins keep a local working draft so edits survive a reload on their device.
  // Everyone else always loads the freshly DEPLOYED data (window.SEED_STATE),
  // so redeploys/backend updates show up immediately.
  if (isAdmin()) {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { try { return JSON.parse(raw); } catch (e) { /* corrupt — ignore */ } }
  }
  if (window.SEED_STATE) return JSON.parse(JSON.stringify(window.SEED_STATE));
  return defaultState();
}

// =========================================================================
// SHARED BACKEND SYNC (optional) — Netlify Function + Netlify Blobs.
// If /.netlify/functions/state is deployed, admin edits are pushed to the
// cloud and every visitor pulls them live. If it is NOT deployed (plain static
// file, or opened locally), all calls fail fast and the tool runs standalone.
// =========================================================================
const REMOTE_URL = "/.netlify/functions/state";
let REMOTE_OK = null;          // null = unprobed, true = backend present, false = absent
let _pushTimer = null;

// The admin's typed password doubles as the backend write-key. It is held in
// sessionStorage (this tab only, never in the page source) so it survives a
// reload but is not exposed to viewers.
function adminKey() { try { return sessionStorage.getItem("aai_admin_key") || ""; } catch (e) { return window.__adminKey || ""; } }

async function remoteGet() {
  const r = await fetch(REMOTE_URL, { cache: "no-store" });
  if (!r.ok) throw new Error("remote get " + r.status);
  const txt = await r.text();
  return (txt && txt !== "null") ? JSON.parse(txt) : null;
}
async function remotePush() {
  if (!canEdit()) return;
  const r = await fetch(REMOTE_URL, {
    method: "POST",
    headers: { "content-type": "application/json", "x-admin-key": adminKey() },
    body: JSON.stringify(window.STATE),
  });
  if (r.status === 403) { console.warn("Backend rejected the admin key — re-unlock to push."); REMOTE_OK = true; return; }
  REMOTE_OK = r.ok;
}
function schedulePush() {
  if (REMOTE_OK === false) return;                 // no backend → don't try
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(() => { remotePush().catch(() => {}); }, 600);   // debounce rapid edits
}
async function syncFromRemote() {
  try {
    const remote = await remoteGet();
    REMOTE_OK = true;
    // Adopt remote only when it is newer than what we hold (don't clobber a
    // newer in-progress admin draft).
    if (remote && (!window.STATE.updatedAt || (remote.updatedAt || 0) > (window.STATE.updatedAt || 0))) {
      window.STATE = remote;
      render();
    }
  } catch (e) { REMOTE_OK = false; /* backend absent — stay standalone */ }
}
function startRemoteSync() {
  syncFromRemote().then(() => {
    if (REMOTE_OK && !isAdmin()) {
      // Viewers / read-only visitors poll for live updates.
      const iv = setInterval(() => {
        if (REMOTE_OK === false || isAdmin()) { clearInterval(iv); return; }
        syncFromRemote();
      }, 15000);
    }
  });
}

// ---- Publish: bake the current data into a redeployable HTML (no backend) ----
async function publishSite() {
  let src;
  try {
    // Prefer the pristine deployed source so the baked data swaps in cleanly.
    const r = await fetch(location.href.split("#")[0].split("?")[0], { cache: "no-store" });
    src = await r.text();
    if (!/window\.SEED_STATE\s*=/.test(src)) throw new Error("seed marker missing");
  } catch (e) {
    src = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  }
  const stateJson = JSON.stringify(window.STATE);
  const playersJson = JSON.stringify(window.STATE.players, null, 2);
  // Replace the two baked-in data blocks with the current live data.
  src = src.replace(/window\.SEED_PLAYERS\s*=\s*\[[\s\S]*?\];/, () => "window.SEED_PLAYERS = " + playersJson + ";");
  src = src.replace(/window\.SEED_STATE\s*=\s*\{[\s\S]*?\};/, () => "window.SEED_STATE = " + stateJson + ";");
  const blob = new Blob([src], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "Tournament_Tool.html";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  alert("Downloaded an updated Tournament_Tool.html with the current data baked in.\n\nRe-deploy it to Netlify (drag it onto your site's Deploys page, or commit it to your Git repo) to publish these results to everyone.");
}
function resetState() {
  if (isViewer()) return;
  if (confirm("Reset ALL data to the original Excel-matched state (your current edits will be lost)?")) {
    localStorage.removeItem(STORAGE_KEY);
    window.STATE = window.SEED_STATE ? JSON.parse(JSON.stringify(window.SEED_STATE)) : defaultState();
    render();
  }
}

// -------------- Helpers ----------------------------------------------------
function nextPlayerId() {
  const ids = window.STATE.players.map(p => p.id);
  return ids.length ? Math.max(...ids) + 1 : 1;
}
function pById(id) { return window.STATE.players.find(p => p.id === id); }
function normName(s) { return (s||"").toLowerCase().trim().replace(/\s+/g," ").replace(/\.$/,"").trim(); }

function mmToHHMM(m) {
  const h = Math.floor(m/60), mn = m%60;
  return String(h).padStart(2,"0") + ":" + String(mn).padStart(2,"0");
}
function dateLabel(d) {
  const map = { "2026-07-04": "4 Jul", "2026-07-05": "5 Jul", "2026-07-11": "11 Jul", "2026-07-12": "12 Jul" };
  return map[d] || d;
}

// =========================================================================
// PAIRING / BRACKET / SCHEDULE ENGINE
// =========================================================================
function buildRosters() {
  const rosters = { MS: [], MD: [], WS: [], WD: [], XD: [] };
  for (const p of window.STATE.players) {
    for (const c of p.cats || []) {
      const k = CAT_MAP[c] || c;
      if (!rosters[k]) continue;
      if ((k === "WS" || k === "WD") && p.gender !== "Female") continue;
      if ((k === "MS" || k === "MD") && p.gender !== "Male") continue;
      rosters[k].push(p.id);
    }
  }
  return rosters;
}

function pairDoubles(ids, mixed, rng) {
  const used = new Set();
  const teams = [];
  // honor mutual preferences
  for (const pid of ids) {
    if (used.has(pid)) continue;
    const p = pById(pid);
    if (!p || !p.partner_pref) continue;
    const prefs = p.partner_pref.replace(/&/g, ",").split(",").map(s => s.trim()).filter(Boolean);
    for (const pref of prefs) {
      const target = ids.find(qid => !used.has(qid) && qid !== pid && normName(pById(qid).name) === normName(pref));
      if (target) {
        if (mixed && pById(pid).gender === pById(target).gender) continue;
        teams.push([pid, target]);
        used.add(pid); used.add(target);
        break;
      }
    }
  }
  const remaining = ids.filter(pid => !used.has(pid));
  if (mixed) {
    const males = shuffle(remaining.filter(pid => pById(pid).gender === "Male"), rng);
    const females = shuffle(remaining.filter(pid => pById(pid).gender === "Female"), rng);
    const n = Math.min(males.length, females.length);
    for (let i = 0; i < n; i++) teams.push([males[i], females[i]]);
  } else {
    const r = shuffle(remaining, rng);
    for (let i = 0; i + 1 < r.length; i += 2) teams.push([r[i], r[i+1]]);
  }
  return teams;
}

function generatePairings() {
  const rng = seededRng(window.STATE.settings.seed);
  const rosters = buildRosters();
  const pairings = {};
  for (const c of CAT_ORDER) {
    const ids = rosters[c];
    if (c === "MS" || c === "WS") {
      pairings[c] = shuffle(ids, rng).map(pid => [pid]);
    } else {
      pairings[c] = pairDoubles(ids, c === "XD", rng);
    }
  }
  return pairings;
}

function buildBracket(entrants, catCode) {
  if (entrants.length < 2) return [];
  let size = 1;
  while (size < entrants.length) size *= 2;
  const byes = size - entrants.length;
  // Layout: first 'byes' entrants get BYE opponent; rest paired consecutively
  const ordered = [];
  for (let i = 0; i < byes; i++) {
    ordered.push({ type: "entrant", idx: i });
    ordered.push({ type: "bye" });
  }
  for (let i = byes; i < entrants.length; i++) {
    ordered.push({ type: "entrant", idx: i });
  }
  const rounds = [];
  const r1 = [];
  for (let j = 0; j < ordered.length; j += 2) {
    r1.push({
      match_id: `${catCode}-R1-${j/2 + 1}`,
      cat: catCode, round: 1,
      side_a: ordered[j], side_b: ordered[j+1],
    });
  }
  rounds.push(r1);
  let prev = r1, rnd = 2;
  while (prev.length > 1) {
    const cur = [];
    for (let j = 0; j < prev.length; j += 2) {
      cur.push({
        match_id: `${catCode}-R${rnd}-${j/2 + 1}`,
        cat: catCode, round: rnd,
        side_a: { winner_of: prev[j].match_id },
        side_b: { winner_of: prev[j+1].match_id },
      });
    }
    rounds.push(cur);
    prev = cur;
    rnd++;
  }
  return rounds;
}

// Returns set of player IDs that COULD be in this match (resolving deps)
function matchPlayers(match, matchById, pairings) {
  const ids = new Set();
  for (const side of [match.side_a, match.side_b]) {
    if (!side) continue;
    if (side.type === "entrant") {
      const t = pairings[match.cat][side.idx] || [];
      for (const pid of t) if (pid != null) ids.add(pid);   // skip vacant slots
    } else if (side.winner_of) {
      const dep = matchById[side.winner_of];
      if (dep) for (const pid of matchPlayers(dep, matchById, pairings)) ids.add(pid);
    }
  }
  return ids;
}

function generateBracketsAndSchedule() {
  const pairings = window.STATE.pairings;
  const allMatches = [];
  const matchById = {};
  const catMaxRound = {};

  for (const c of CAT_ORDER) {
    const ents = pairings[c] || [];
    if (ents.length < 2) { catMaxRound[c] = 0; continue; }
    const rounds = buildBracket(ents, c);
    for (const rnd of rounds) for (const m of rnd) { allMatches.push(m); matchById[m.match_id] = m; }
    catMaxRound[c] = rounds.length;
  }

  // Annotate phase, stage, duration
  for (const m of allMatches) {
    const fromEnd = catMaxRound[m.cat] - m.round;
    if (fromEnd <= 2) {
      m.phase = "KNOCKOUT";
      m.duration = window.STATE.settings.knockoutDuration;
      m.stage = fromEnd === 0 ? "Final" : (fromEnd === 1 ? "Semifinal" : "Quarterfinal");
    } else {
      m.phase = "QUALIFIER";
      m.duration = window.STATE.settings.qualifierDuration;
      m.stage = `R${m.round}`;
    }
  }

  // Auto-resolve BYE matches (one side is BYE entrant)
  const autoWin = {};  // match_id -> winning side ('A','B','BYE')
  const ordered = [...allMatches].sort((a,b) => a.round - b.round);
  for (const m of ordered) {
    const resolve = side => {
      if (side.type === "bye") return "BYE";
      if (side.type === "entrant") return "ENT";
      if (side.winner_of) return autoWin[side.winner_of] || "PENDING";
      return "PENDING";
    };
    const ra = resolve(m.side_a), rb = resolve(m.side_b);
    if (ra === "BYE" && rb === "BYE") autoWin[m.match_id] = "BYE";
    else if (ra === "BYE" && rb === "ENT") autoWin[m.match_id] = "B";
    else if (rb === "BYE" && ra === "ENT") autoWin[m.match_id] = "A";
    // For winner_of chains, we'll handle re-derivation when downstream matches resolve
  }
  // Apply user-entered results too, then propagate
  const results = { ...autoWin, ...window.STATE.results };
  // We don't recompute auto-advance through user results here; the bracket display will pick up.

  // SCHEDULE v2: per-court free-interval list, packs around dep constraints (no wasted gaps)
  const priority = { MS: 0, WS: 0, XD: 0, MD: 1, WD: 1 };
  const blocks = window.STATE.settings.blocks;
  // courts[date|court|label] = { free: [[s,e],...] }
  const courts = {};
  for (const b of blocks) {
    for (let c = 1; c <= b.courts; c++) {
      courts[`${b.date}|${c}|${b.label}`] = { free: [[b.startMin, b.endMin]] };
    }
  }
  // For each match: deps_of
  const depsOf = {};
  for (const m of allMatches) {
    const ds = [];
    if (m.side_a && m.side_a.winner_of) ds.push(m.side_a.winner_of);
    if (m.side_b && m.side_b.winner_of) ds.push(m.side_b.winner_of);
    depsOf[m.match_id] = ds;
  }
  // Sort: qualifiers first, then by round, then cat priority
  const sorted = [...allMatches].filter(m => !autoWin[m.match_id]).sort((a, b) => {
    const pa = a.phase === "QUALIFIER" ? 0 : 1;
    const pb = b.phase === "QUALIFIER" ? 0 : 1;
    if (pa !== pb) return pa - pb;
    if (a.round !== b.round) return a.round - b.round;
    const ca = priority[a.cat] ?? 9, cb = priority[b.cat] ?? 9;
    if (ca !== cb) return ca - cb;
    return a.match_id.localeCompare(b.match_id);
  });
  const schedById = {};
  const playerBusy = {};
  function findSlot(intervals, duration, earliest) {
    for (let i = 0; i < intervals.length; i++) {
      const [s, e] = intervals[i];
      const start = Math.max(s, earliest);
      if (start + duration <= e) return { i, start };
    }
    return null;
  }
  function bookSlot(intervals, i, start, end) {
    const [s, e] = intervals[i];
    intervals.splice(i, 1);
    let idx = i;
    if (s < start) { intervals.splice(idx, 0, [s, start]); idx++; }
    if (end < e) { intervals.splice(idx, 0, [end, e]); }
  }
  let changed = true, iter = 0;
  while (changed && iter < 30) {
    changed = false; iter++;
    for (const m of sorted) {
      if (schedById[m.match_id]) continue;
      // Deps must be scheduled or auto-decided
      let depOk = true;
      for (const d of depsOf[m.match_id]) {
        if (schedById[d]) continue;
        if (autoWin[d]) continue;
        depOk = false; break;
      }
      if (!depOk) continue;
      const pids = matchPlayers(m, matchById, pairings);
      let best = null;
      for (const b of blocks) {
        if (b.phase !== m.phase) continue;
        let earliest = b.startMin;
        for (const d of depsOf[m.match_id]) {
          const ds = schedById[d];
          if (ds && ds.date === b.date) earliest = Math.max(earliest, ds.endMin);
        }
        for (let c = 1; c <= b.courts; c++) {
          const ci = courts[`${b.date}|${c}|${b.label}`];
          if (!ci) continue;
          const slot = findSlot(ci.free, m.duration, earliest);
          if (!slot) continue;
          const start = slot.start, end = start + m.duration;
          let overlap = false;
          for (const pid of pids) {
            const busy = playerBusy[pid] || [];
            for (const bb of busy) {
              if (bb.date === b.date && !(end <= bb.s || start >= bb.e)) { overlap = true; break; }
            }
            if (overlap) break;
          }
          if (overlap) continue;
          const key = [b.date, start];
          if (!best || key[0] < best.key[0] || (key[0] === best.key[0] && key[1] < best.key[1])) {
            best = { key, b, c, ci, slotIdx: slot.i, start, end };
          }
        }
      }
      if (best) {
        bookSlot(best.ci.free, best.slotIdx, best.start, best.end);
        const entry = { match_id: m.match_id, date: best.b.date, court: best.c, startMin: best.start, endMin: best.end, block: best.b.label, stage: m.stage, cat: m.cat, phase: m.phase, duration: m.duration };
        schedById[m.match_id] = entry;
        for (const pid of pids) (playerBusy[pid] = playerBusy[pid] || []).push({ date: best.b.date, s: best.start, e: best.end });
        changed = true;
      }
    }
  }
  const sched = Object.values(schedById);
  const unsched = allMatches.filter(m => !autoWin[m.match_id] && !schedById[m.match_id]);

  // Save
  window.STATE.matches = allMatches;
  window.STATE.scheduled = sched;
  window.STATE.unscheduled = unsched.map(m => ({ match_id: m.match_id, cat: m.cat, round: m.round, stage: m.stage }));
  window.STATE.autoWin = autoWin;
  saveState();
}

// =========================================================================
// RESOLUTION (sides → display labels, given results)
// =========================================================================
function entrantLabel(cat, idx) {
  const t = window.STATE.pairings[cat][idx];
  if (!t) return "?";
  return t.map(pid => pid == null ? "(vacant)" : ((pById(pid) || {}).name || `#${pid}`)).join(" / ");
}
function sideLabelFor(cat, side, includeId = false) {
  if (!side) return "—";
  if (side.type === "entrant") return entrantLabel(cat, side.idx);
  if (side.type === "bye") return "BYE";
  if (side.winner_of) {
    const winner = effectiveWinner(side.winner_of);
    if (winner === "PENDING") return includeId ? `Winner of ${side.winner_of}` : `Winner of ${side.winner_of}`;
    if (winner === "BYE") return "BYE";
    // winner is 'A' or 'B' — recursively resolve
    const dep = window.STATE.matches.find(x => x.match_id === side.winner_of);
    if (!dep) return "?";
    return winner === "A" ? sideLabelFor(cat, dep.side_a, includeId) : sideLabelFor(cat, dep.side_b, includeId);
  }
  return "?";
}
function effectiveWinner(matchId) {
  // Returns 'A', 'B', 'BYE', or 'PENDING'
  if (window.STATE.results[matchId]) return window.STATE.results[matchId];
  if (window.STATE.autoWin && window.STATE.autoWin[matchId]) {
    const aw = window.STATE.autoWin[matchId];
    return aw === "BYE" ? "BYE" : aw;
  }
  return "PENDING";
}

// RENDERING
// =========================================================================
const $ = sel => document.querySelector(sel);

function el(tag, attrs = {}, ...children) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    n.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  }
  return n;
}

function setTab(name) {
  window.STATE.activeTab = name;
  saveState();
  render();
}

function render() {
  const root = $("#app");
  root.innerHTML = "";
  root.appendChild(renderHeader());
  root.appendChild(renderTabs());
  const main = el("div", { class: "main" });
  root.appendChild(main);
  const tab = window.STATE.activeTab;
  if (tab === "players") main.appendChild(renderPlayers());
  else if (tab === "settings") main.appendChild(canEdit() ? renderSettings() : renderPlayers());
  else if (tab === "pairings") main.appendChild(renderPairings());
  else if (tab === "brackets") main.appendChild(renderBrackets());
  else if (tab === "schedule") main.appendChild(renderSchedule());
  else if (tab === "results") main.appendChild(renderResults());
  else if (tab === "leaderboard") main.appendChild(renderLeaderboard());
}

// EXL corporate wordmark, drawn as inline SVG so it is fully self-contained
// (no external image, works offline and inside the exported viewer file).
// To use the official brand asset instead: replace this string with
// `<img src="data:image/png;base64,…" class="exl-svg" alt="EXL">` using your PNG/SVG.
const EXL_LOGO_SVG = `<svg class="exl-svg" viewBox="0 0 98 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EXL"><text x="1" y="38" font-family="'Arial Black', Arial, Helvetica, sans-serif" font-weight="900" font-size="46" letter-spacing="0.5" fill="#0f172a">EXL</text></svg>`;

function renderHeader() {
  const actions = el("div", { class: "topactions" });
  if (canEdit()) {
    // Admin toolbar
    actions.appendChild(el("button", { class: "btn btn-refresh", onClick: refreshAndExport }, "↻ Refresh & Export Excel"));
    actions.appendChild(el("button", { class: "btn btn-success", onClick: publishSite }, "⬆ Publish (download to redeploy)"));
    actions.appendChild(el("button", { class: "btn btn-primary", onClick: copyShareLink }, "🔗 Copy read-only link"));
    actions.appendChild(el("button", { class: "btn", onClick: exportViewerHTML }, "📤 Save viewer file"));
    actions.appendChild(el("button", { class: "btn", onClick: exportJSON }, "Export JSON"));
    actions.appendChild(el("button", { class: "btn", onClick: importJSON }, "Import JSON"));
    actions.appendChild(el("button", { class: "btn btn-warn", onClick: resetState }, "Reset"));
  } else if (!isViewer()) {
    // Read-only on the admin URL (not yet unlocked): still let organisers grab the share link.
    actions.appendChild(el("button", { class: "btn", onClick: copyShareLink }, "🔗 Copy read-only link"));
  }
  const header = el("header", { class: "topbar" },
    el("h1", {},
      el("span", { class: "exl-logo", html: EXL_LOGO_SVG }),
      el("span", { class: "brand-sep" }),
      el("span", { class: "logo" }, "🏸"),
      "AAI Badminton Tournament 2026"),
    actions
  );
  // Header + the mode banner are returned together so render() stays unchanged.
  return el("div", {}, header, renderModeBanner());
}

// The mode banner makes the Admin vs Viewer distinction obvious and hosts the
// password unlock on the normal URL.
function renderModeBanner() {
  if (canEdit()) {
    return el("div", { class: "mode-banner mode-admin" },
      el("span", { class: "dot" }),
      el("span", {}, "Admin mode — editing enabled"),
      el("span", { class: "spacer" }),
      el("button", { class: "btn btn-sm", onClick: logoutAdmin }, "🔒 Lock admin")
    );
  }
  if (isViewer()) {
    const ts = window.VIEWER_SNAPSHOT_AT ? " · snapshot " + window.VIEWER_SNAPSHOT_AT : "";
    return el("div", { class: "mode-banner mode-view" },
      el("span", { class: "dot" }),
      el("span", {}, "Read-only shared view — editing is disabled" + ts)
    );
  }
  // Normal URL, not yet unlocked: show the inline password unlock.
  const pwI = el("input", { type: "password", placeholder: "Admin password", autocomplete: "off" });
  const err = el("span", { class: "err" });
  const submit = async () => {
    err.textContent = "Checking…";
    await new Promise(r => setTimeout(r, 20));   // let "Checking…" paint before the (possibly sync) hash runs
    if (await tryLogin(pwI.value)) {
      // Keep the password (this tab only) as the backend write-key, then sync.
      try { sessionStorage.setItem("aai_admin_key", pwI.value); } catch (e) { window.__adminKey = pwI.value; }
      render(); startRemoteSync();
    }
    else { err.textContent = "Incorrect password"; pwI.value = ""; pwI.focus(); }
  };
  pwI.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  return el("div", { class: "mode-banner mode-view" },
    el("span", { class: "dot" }),
    el("span", {}, "Read-only — unlock to edit"),
    el("span", { class: "spacer" }),
    el("div", { class: "login-bar" },
      pwI,
      el("button", { class: "btn btn-sm btn-primary", onClick: submit }, "Unlock admin"),
      err
    )
  );
}

function renderTabs() {
  // Settings is admin-only; everyone else gets the viewing tabs.
  const tabs = !canEdit() ? [
    ["players", "Players"], ["pairings", "Pairings"], ["brackets", "Brackets"],
    ["schedule", "Schedule"], ["results", "Results"], ["leaderboard", "Leaderboard"]
  ] : [
    ["players", "Players"], ["settings", "Settings"], ["pairings", "Pairings"],
    ["brackets", "Brackets"], ["schedule", "Schedule"], ["results", "Results"], ["leaderboard", "Leaderboard"]
  ];
  return el("nav", { class: "tabs" },
    ...tabs.map(([k, label]) => el("button", {
      class: "tab" + (window.STATE.activeTab === k ? " active" : ""),
      onClick: () => setTab(k),
    }, label))
  );
}

// ---------- Players tab ----------
function renderPlayers() {
  const div = el("div", { class: "panel" });
  div.appendChild(el("h2", {}, `Players (${window.STATE.players.length})`));
  const editing = canEdit();

  if (editing) {
    div.appendChild(el("p", { class: "muted" },
      "Add or remove players and edit their category nominations directly in the table. " +
      "Pairings update automatically: existing valid pairings are preserved, a dropped doubles category leaves the partner in place with a vacant slot, and newly eligible players appear in the Unpaired lists on the Pairings tab. Click ",
      el("b", {}, "↻ Refresh & Export Excel"), " to download the updated workbook."));
  } else {
    div.appendChild(el("p", { class: "muted" }, "Read-only view of nominated players. Unlock admin mode to edit."));
  }

  // ---- Add-player form (admin only) ----
  if (editing) {
    const form = el("div", { class: "addform" });
    const nameI = el("input", { type: "text", placeholder: "Name" });
    const genderI = el("select", {}, el("option", { value: "Male" }, "Male"), el("option", { value: "Female" }, "Female"));
    const cat1I = el("select", {}, ...["", "MS", "MD", "WS", "WD", "XD"].map(c => el("option", { value: c }, c ? CAT_LABEL[c] : "— Category 1 —")));
    const cat2I = el("select", {}, ...["", "MS", "MD", "WS", "WD", "XD"].map(c => el("option", { value: c }, c ? CAT_LABEL[c] : "— Category 2 —")));
    const addBtn = el("button", { class: "btn btn-primary", onClick: () => {
      const name = nameI.value.trim();
      if (!name) { alert("Name required"); return; }
      let cats = [cat1I.value, cat2I.value].filter(Boolean);
      cats = cats.filter((c, i) => cats.indexOf(c) === i);                  // de-duplicate
      if (!cats.length) { alert("Pick at least one category"); return; }
      const allowed = allowedCatsFor(genderI.value);
      const bad = cats.filter(c => !allowed.includes(c));
      if (bad.length) { alert(`${genderI.value} players cannot enter: ${bad.map(c => CAT_LABEL[c]).join(", ")}`); return; }
      const p = { id: nextPlayerId(), name, gender: genderI.value, cats, partner_pref: null };
      window.STATE.players.push(p);
      // Singles -> add as a draw entrant; doubles -> appears in the Unpaired pool.
      reconcileCategoryChange(p, [], cats);
      generateBracketsAndSchedule();
      saveState(); render();
    }}, "+ Add player");
    form.appendChild(nameI); form.appendChild(genderI); form.appendChild(cat1I); form.appendChild(cat2I); form.appendChild(addBtn);
    div.appendChild(form);
  }

  // ---- Player table ----
  const wrap = el("div", { class: "table-wrap" });
  const tbl = el("table", { class: "table" });
  tbl.appendChild(el("thead", {}, el("tr", {},
    el("th", {}, "ID"), el("th", {}, "Name"), el("th", {}, "Gender"),
    el("th", {}, "Categories"), el("th", {}, editing ? "Actions" : "")
  )));
  const tb = el("tbody", {});
  for (const p of window.STATE.players) {
    let catCell;
    if (editing) {
      // Gender-aware checkboxes; toggling reconciles pairings incrementally.
      catCell = el("div", { class: "cat-edit" });
      const current = playerCats(p);
      allowedCatsFor(p.gender).forEach(c => {
        const on = current.includes(c);
        const cb = el("input", { type: "checkbox" });
        cb.checked = on;
        const lbl = el("label", { class: on ? "on" : "" }, cb, CAT_LABEL[c]);
        cb.addEventListener("change", () => {
          const before = playerCats(p);
          let after = cb.checked ? [...before, c] : before.filter(x => x !== c);
          after = after.filter((x, i) => after.indexOf(x) === i);
          if (!after.length) { alert("A player must stay in at least one category."); cb.checked = true; return; }
          reconcileCategoryChange(p, before, after);   // preserve valid pairings; free/seed the rest
          p.cats = after;
          generateBracketsAndSchedule();
          saveState(); render();
        });
        catCell.appendChild(lbl);
      });
    } else {
      catCell = el("span", {}, ...playerCats(p).map(c => el("span", { class: "cat-pill" }, CAT_LABEL[c] || c)));
    }

    const actionCell = editing
      ? el("button", { class: "btn btn-sm btn-danger", onClick: () => {
          if (confirm(`Remove ${p.name}? They will be taken out of all categories. In any doubles pair, their partner stays and the slot becomes vacant for reassignment.`)) {
            removePlayerFromPairings(p.id);                                  // keep records, vacate doubles slots
            window.STATE.players = window.STATE.players.filter(x => x.id !== p.id);
            generateBracketsAndSchedule();
            saveState(); render();
          }
        }}, "Remove")
      : "";

    tb.appendChild(el("tr", {},
      el("td", {}, String(p.id)),
      el("td", {}, p.name),
      el("td", {}, p.gender),
      el("td", {}, catCell),
      el("td", {}, actionCell)
    ));
  }
  tbl.appendChild(tb);
  wrap.appendChild(tbl);
  div.appendChild(wrap);
  return div;
}

  div.appendChild(el("h2", {}, "Settings"));
  div.appendChild(el("p", { class: "muted" }, "Adjust match durations, court availability, and the random-draw seed. Re-generate pairings on the Pairings tab after changes."));

  div.appendChild(el("h3",{},"Court Availability"));
  const tbl = el("table", { class: "table" });

    saveState(); render();

// ---------- Pairings tab ----------
function renderPairings() {
  const div = el("div", { class: "panel" });
  div.appendChild(el("h2", {}, "Pairings"));
  const editing = canEdit();

  if (editing) {
    div.appendChild(el("p", { class: "muted" },
      "Drag players to manage doubles pairings and reorder singles draws. Existing pairings are preserved — you only change what you touch."));
    div.appendChild(el("div", { class: "refresh-info" },
      "⚡ Drag a name into a vacant slot, drag a player from the ", el("b", {}, "Unpaired Players"),
      " list at the bottom of each doubles category, or drop a paired player onto that list to free their slot. Brackets & schedule update instantly."));
  } else {
    div.appendChild(el("p", { class: "muted" }, "Read-only view of pairings. Unlock admin mode to edit."));
  }

  // Optional full (re)generate of the draw — admin only.
  if (editing) {
    const actions = el("div", { class: "actionbar" });
    actions.appendChild(el("button", { class: "btn btn-primary", onClick: () => {
      if (confirm("Re-generate ALL pairings from scratch? This honours partner preferences, then randomly pairs the rest, replacing the current draw.")) {
        window.STATE.pairings = generatePairings();
        generateBracketsAndSchedule();
        saveState(); render();
      }
    }}, "🔀 Re-generate all pairings"));
    div.appendChild(actions);
  }

  // ---------- drag/drop core ----------
  function commit() { generateBracketsAndSchedule(); saveState(); render(); }

  // Is a team internally valid (no duplicate player; XD must be one male + one female)?
  function teamValid(cat, teamIdx) {
    const t = window.STATE.pairings[cat][teamIdx];
    if (!t) return true;
    if (t[0] != null && t[0] === t[1]) return false;
    if (cat === "XD") {
      const a = t[0] != null ? pById(t[0]) : null;
      const b = t[1] != null ? pById(t[1]) : null;
      if (a && b && a.gender === b.gender) return false;
    }
    return true;
  }

  // Move the player described by `payload` into pairings[cat][team][slot].
  function dropIntoSlot(cat, team, slot, payload) {
    if (!payload || payload.cat !== cat) { alert("That player isn't nominated for " + CAT_LABEL[cat] + "."); return; }
    const arr = window.STATE.pairings[cat];
    const occupant = arr[team][slot];                              // may be null
    if (payload.kind === "slot") {
      if (payload.team === team && payload.slot === slot) return;  // dropped on itself
      const st = payload.team, ss = payload.slot;
      const moving = arr[st][ss];
      arr[st][ss] = occupant;                                      // swap (occupant may be null => source becomes vacant)
      arr[team][slot] = moving;
      if (!teamValid(cat, st) || !teamValid(cat, team)) {          // revert if it breaks the XD gender rule
        arr[team][slot] = occupant; arr[st][ss] = moving;
        alert("That move isn't allowed — Mixed Doubles needs one male and one female."); return;
      }
      window.STATE.pairings[cat] = arr.filter(t => t.some(x => x != null));  // prune empty teams
    } else { // payload.kind === "pool"
      arr[team][slot] = payload.pid;                               // any displaced occupant returns to the pool automatically
      if (!teamValid(cat, team)) {
        arr[team][slot] = occupant;
        alert("That player can't join this pair — Mixed Doubles needs one male and one female."); return;
      }
    }
    commit();
  }

  // Dropping a paired player onto the Unpaired tray frees their slot.
  function dropIntoPool(cat, payload) {
    if (!payload || payload.kind !== "slot" || payload.cat !== cat) return;
    const arr = window.STATE.pairings[cat];
    arr[payload.team][payload.slot] = null;
    window.STATE.pairings[cat] = arr.filter(t => t.some(x => x != null));
    commit();
  }

  // A draggable player name sitting in a doubles slot (also a drop target → swap/replace).
  function slotPlayer(cat, team, slot, pid) {
    const p = pById(pid);
    const span = el("span", { class: "drag-player", draggable: "true" }, p ? p.name : ("#" + pid));
    span.addEventListener("dragstart", e => {
      span.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", JSON.stringify({ kind: "slot", cat, team, slot, pid }));
    });
    span.addEventListener("dragend", () => {
      span.classList.remove("dragging");
      document.querySelectorAll(".drop-ok,.drop-bad,.drag-target").forEach(x => x.classList.remove("drop-ok", "drop-bad", "drag-target"));
    });
    span.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; span.classList.add("drag-target"); });
    span.addEventListener("dragleave", () => span.classList.remove("drag-target"));
    span.addEventListener("drop", e => {
      e.preventDefault(); span.classList.remove("drag-target");
      try { dropIntoSlot(cat, team, slot, JSON.parse(e.dataTransfer.getData("text/plain"))); } catch (err) { console.error(err); }
    });
    return span;
  }

  // A vacant slot — a clear, inviting drop target.
  function vacantSlot(cat, team, slot) {
    const zone = el("span", { class: "slot-vacant" }, "+ Drop player");
    zone.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; zone.classList.add("drop-ok"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("drop-ok", "drop-bad"));
    zone.addEventListener("drop", e => {
      e.preventDefault(); zone.classList.remove("drop-ok", "drop-bad");
      try { dropIntoSlot(cat, team, slot, JSON.parse(e.dataTransfer.getData("text/plain"))); } catch (err) { console.error(err); }
    });
    return zone;
  }

  // A chip in the Unpaired pool.
  function poolChip(cat, p) {
    const span = el("span", { class: "drag-player", draggable: "true", title: p.gender }, p.name);
    span.addEventListener("dragstart", e => {
      span.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", JSON.stringify({ kind: "pool", cat, pid: p.id }));
    });
    span.addEventListener("dragend", () => span.classList.remove("dragging"));
    return span;
  }

  // Singles row reordering (draw position).
  function singlesDragRow(tr, tb, cat, idx) {
    tr.addEventListener("dragstart", e => {
      tr.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", JSON.stringify({ kind: "single", cat, idx }));
    });
    tr.addEventListener("dragend", () => {
      tr.classList.remove("dragging");
      tb.querySelectorAll(".drag-over").forEach(x => x.classList.remove("drag-over"));
    });
    tr.addEventListener("dragover", e => {
      e.preventDefault(); e.dataTransfer.dropEffect = "move";
      tb.querySelectorAll(".drag-over").forEach(x => x.classList.remove("drag-over"));
      tr.classList.add("drag-over");
    });
    tr.addEventListener("dragleave", () => tr.classList.remove("drag-over"));
    tr.addEventListener("drop", e => {
      e.preventDefault(); tr.classList.remove("drag-over");
      try {
        const from = JSON.parse(e.dataTransfer.getData("text/plain"));
        if (from.kind !== "single" || from.cat !== cat || from.idx === idx) return;
        const arr = window.STATE.pairings[cat];
        const [moved] = arr.splice(from.idx, 1);
        arr.splice(idx, 0, moved);
        commit();
      } catch (err) { console.error(err); }
    });
  }

  // ---------- render each category ----------
  for (const c of CAT_ORDER) {
    const ents = (window.STATE.pairings[c] || []);
    const isSingles = isSinglesCat(c);
    const unpaired = isDoublesCat(c) ? unpairedFor(c) : [];
    if (!ents.length && !unpaired.length) continue;

    div.appendChild(el("h3", {}, `${CAT_LABEL[c]} — ${ents.length} ${isSingles ? "players" : "teams"}`));

    if (ents.length) {
      const wrap = el("div", { class: "table-wrap" });
      const tbl = el("table", { class: "table" });
      const headerCols = [];
      if (editing && isSingles) headerCols.push(el("th", { style: "width:30px" }, ""));
      headerCols.push(el("th", {}, "#"), el("th", {}, isSingles ? "Player" : "Player 1"));
      if (!isSingles) headerCols.push(el("th", {}, "Player 2"));
      tbl.appendChild(el("thead", {}, el("tr", {}, ...headerCols)));
      const tb = el("tbody", {});

      ents.forEach((t, i) => {
        const cells = [];
        if (isSingles) {
          if (editing) cells.push(el("td", {}, el("span", { class: "drag-handle" }, "≡")));
          cells.push(el("td", {}, String(i + 1)));
          const p1 = pById(t[0]);
          cells.push(el("td", {}, p1 ? p1.name : "(vacant)"));
          const tr = el("tr", editing ? { class: "draggable-row", draggable: "true" } : {}, ...cells);
          if (editing) singlesDragRow(tr, tb, c, i);
          tb.appendChild(tr);
        } else {
          cells.push(el("td", {}, String(i + 1)));
          [0, 1].forEach(slot => {
            const pid = t[slot];
            let cellNode;
            if (pid != null) cellNode = editing ? slotPlayer(c, i, slot, pid) : (pById(pid) ? pById(pid).name : "#" + pid);
            else cellNode = editing ? vacantSlot(c, i, slot) : el("span", { class: "bye" }, "(vacant)");
            cells.push(el("td", {}, cellNode));
          });
          tb.appendChild(el("tr", {}, ...cells));
        }
      });
      tbl.appendChild(tb);
      wrap.appendChild(tbl);
      div.appendChild(wrap);
    }

    // ---- Unpaired Players tray (doubles only) ----
    if (isDoublesCat(c)) {
      const tray = el("div", { class: "unpaired" });
      tray.appendChild(el("h4", {}, "Unpaired Players", el("span", { class: "count" }, String(unpaired.length))));
      const list = el("div", { class: "unpaired-list" });
      if (!unpaired.length) {
        list.appendChild(el("span", { class: "unpaired-empty" }, "Everyone nominated for this category is currently paired."));
      } else {
        unpaired.forEach(p => list.appendChild(editing ? poolChip(c, p) : el("span", { class: "drag-player is-readonly" }, p.name)));
      }
      tray.appendChild(list);
      if (editing) {
        tray.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; tray.style.outline = "2px dashed #2E75B6"; });
        tray.addEventListener("dragleave", () => { tray.style.outline = ""; });
        tray.addEventListener("drop", e => {
          e.preventDefault(); tray.style.outline = "";
          try { dropIntoPool(c, JSON.parse(e.dataTransfer.getData("text/plain"))); } catch (err) { console.error(err); }
        });
      }
      div.appendChild(tray);
    }
  }

  if (!editing) div.classList.add("is-readonly");
  return div;
}

// ---------- Brackets tab ----------
function renderBrackets() {
  const div = el("div", { class: "panel" });
  div.appendChild(el("h2", {}, "Brackets"));
  if (!window.STATE.matches.length) {
    div.appendChild(el("p", { class: "muted" }, "Generate pairings first."));
    return div;
  }
  // Tabs for category
  const catTabs = el("div", { class: "subtabs" });
  const catState = { current: window.STATE._bracketCat || "MS" };
  CAT_ORDER.forEach(c => {
    catTabs.appendChild(el("button", {
      class: "subtab" + (catState.current === c ? " active" : ""),
      onClick: () => { window.STATE._bracketCat = c; saveState(); render(); }
    }, CAT_LABEL[c]));
  });
  div.appendChild(catTabs);

  const c = catState.current;
  const cat_matches = window.STATE.matches.filter(m => m.cat === c);
  if (!cat_matches.length) { div.appendChild(el("p",{class:"muted"}, "No matches in this category.")); return div; }
  const maxRound = Math.max(...cat_matches.map(m=>m.round));
  const rounds = [];
  for (let r = 1; r <= maxRound; r++) {
    rounds.push(cat_matches.filter(m=>m.round===r).sort((a,b)=>parseInt(a.match_id.split("-").pop())-parseInt(b.match_id.split("-").pop())));
  }
  const wrap = el("div", { class: "bracket-wrap" });
  rounds.forEach((rms, i) => {
    const col = el("div", { class: "bracket-col" });
    const stageName = (i === maxRound-1) ? "Final" : (i === maxRound-2) ? "Semifinal" : (i === maxRound-3) ? "Quarterfinal" : `Round ${i+1}`;
    col.appendChild(el("div", { class: "bracket-stage" }, stageName));
    rms.forEach(m => {
      const aLabel = sideLabelFor(c, m.side_a);
      const bLabel = sideLabelFor(c, m.side_b);
      const winner = effectiveWinner(m.match_id);
      const aClass = "match-side" + (winner === "A" ? " winner" : winner === "BYE" && aLabel === "BYE" ? " bye" : "");
      const bClass = "match-side" + (winner === "B" ? " winner" : winner === "BYE" && bLabel === "BYE" ? " bye" : "");
      const card = el("div", { class: "match-card" },
        el("div", { class: "match-id" }, m.match_id + (m.stage ? ` · ${m.stage}` : "")),
        el("div", { class: aClass }, aLabel),
        el("div", { class: bClass }, bLabel),
      );
      col.appendChild(card);
    });
    wrap.appendChild(col);
  });
  div.appendChild(wrap);
  return div;
}

// ---------- Schedule tab ----------
function renderSchedule() {
  const div = el("div", { class: "panel" });
  div.appendChild(el("h2", {}, "Match Schedule"));
  const sched = window.STATE.scheduled;
  if (!sched.length) {
    div.appendChild(el("p", { class: "muted" }, "Generate pairings first."));
    return div;
  }
  const unsched = window.STATE.unscheduled || [];
  div.appendChild(el("p",{class:"muted"},
    `${sched.length} matches scheduled. `,
    unsched.length ? el("span",{class:"warn"}, `${unsched.length} matches did not fit available court time.`) : "All matches fit."
  ));
  // group by date
  const byDate = {};
  for (const s of sched) { (byDate[s.date] = byDate[s.date] || []).push(s); }
  const dates = Object.keys(byDate).sort();
  dates.forEach(d => {
    div.appendChild(el("h3",{}, dateLabel(d) + ", 2026"));
    const tbl = el("table",{class:"table"});
    tbl.appendChild(el("thead",{}, el("tr",{},
      el("th",{},"Time"), el("th",{},"Court"), el("th",{},"Match ID"),
      el("th",{},"Category"), el("th",{},"Stage"),
      el("th",{},"Side A"), el("th",{},"Side B"),
      el("th",{},"Result"),
    )));
    const tb = el("tbody",{});
    byDate[d].sort((a,b)=> a.startMin - b.startMin || a.court - b.court).forEach(s => {
      const m = window.STATE.matches.find(x => x.match_id === s.match_id);
      const aLabel = sideLabelFor(m.cat, m.side_a);
      const bLabel = sideLabelFor(m.cat, m.side_b);
      const win = effectiveWinner(m.match_id);
      const resTxt = win === "PENDING" ? "—" : (win === "A" ? aLabel : (win === "B" ? bLabel : "BYE"));
      tb.appendChild(el("tr",{},
        el("td",{}, `${mmToHHMM(s.startMin)}–${mmToHHMM(s.endMin)}`),
        el("td",{}, "Court " + s.court),
        el("td",{}, s.match_id),
        el("td",{}, CAT_LABEL[s.cat]),
        el("td",{}, s.stage),
        el("td",{class: win==="A"?"winner":""}, aLabel),
        el("td",{class: win==="B"?"winner":""}, bLabel),
        el("td",{class: win!=="PENDING"?"ok":""}, resTxt),
      ));
    });
    tbl.appendChild(tb);
    div.appendChild(tbl);
  });
  if (unsched.length) {
    div.appendChild(el("h3",{class:"warn"}, `Unscheduled matches (${unsched.length})`));
    div.appendChild(el("p",{class:"muted"}, "These could not fit. Add more court hours on the Settings tab or shorten match durations, then regenerate."));
    const tbl = el("table",{class:"table"});
    tbl.appendChild(el("thead",{}, el("tr",{},
      el("th",{},"Match ID"), el("th",{},"Category"), el("th",{},"Stage")
    )));
    const tb = el("tbody",{});
    unsched.forEach(u => {
      tb.appendChild(el("tr",{},
        el("td",{},u.match_id), el("td",{},CAT_LABEL[u.cat]), el("td",{},u.stage)
      ));
    });
    tbl.appendChild(tb);
    div.appendChild(tbl);
  }
  return div;
}

// ---------- Results tab ----------
function renderResults() {
  const div = el("div", { class: "panel" });
  div.appendChild(el("h2", {}, canEdit() ? "Enter Results" : "Results"));
  div.appendChild(canEdit()
    ? el("p", { class: "muted" }, "Click ", el("b",{}, "A wins"), " or ", el("b",{}, "B wins"), " to mark the winner. Next-round matches and the leaderboard update automatically. BYE matches auto-advance.")
    : el("p", { class: "muted" }, "Read-only view of match results. Unlock admin mode to enter or change results."));

  if (!window.STATE.matches.length) {
    div.appendChild(el("p",{class:"muted"}, "Generate pairings first."));
    return div;
  }

  // --- Per-category match status counters ---
  const statsBar = el("div", { class: "stats-bar" });
  const catStats = {};
  let totalPlayed = 0, totalRemaining = 0, totalBye = 0;
  for (const c of CAT_ORDER) catStats[c] = { played: 0, remaining: 0, bye: 0, total: 0 };
  for (const m of window.STATE.matches) {
    const w = effectiveWinner(m.match_id);
    if (!catStats[m.cat]) continue;
    catStats[m.cat].total++;
    if (w === "A" || w === "B") { catStats[m.cat].played++; totalPlayed++; }
    else if (w === "BYE") { catStats[m.cat].bye++; totalBye++; }
    else { catStats[m.cat].remaining++; totalRemaining++; }
  }
  // Overall card
  const overallCard = el("div", { class: "stat-card", style: "border-color:#1F4E78" });
  overallCard.appendChild(el("div", { class: "stat-label" }, "OVERALL"));
  overallCard.appendChild(el("div", { class: "stat-nums" },
    el("span", { class: "stat-played" }, String(totalPlayed) + " played"),
    " / ",
    el("span", { class: "stat-remaining" }, String(totalRemaining) + " remaining"),
    el("span", { class: "stat-total" }, " (" + (totalPlayed + totalRemaining + totalBye) + " total, " + totalBye + " BYE)")
  ));
  statsBar.appendChild(overallCard);
  // Per-category cards
  for (const c of CAT_ORDER) {
    const s = catStats[c];
    if (s.total === 0) continue;
    const card = el("div", { class: "stat-card" });
    card.appendChild(el("div", { class: "stat-label" }, CAT_LABEL[c]));
    card.appendChild(el("div", { class: "stat-nums" },
      el("span", { class: "stat-played" }, String(s.played)),
      " / ",
      el("span", { class: "stat-remaining" }, String(s.remaining)),
      el("span", { class: "stat-total" }, " (" + s.total + ")")
    ));
    statsBar.appendChild(card);
  }
  div.appendChild(statsBar);

  // Filter controls
  const filterBar = el("div", { class: "filterbar" });
  const catFilter = el("select",{},
    el("option",{value:""},"All categories"),
    ...CAT_ORDER.map(c => el("option",{value:c}, CAT_LABEL[c])));
  catFilter.value = window.STATE._resFilter?.cat || "";
  const statusFilter = el("select",{},
    el("option",{value:""},"All matches"),
    el("option",{value:"pending"},"Pending"),
    el("option",{value:"done"},"Decided"),
    el("option",{value:"ready"},"Ready to play"));
  statusFilter.value = window.STATE._resFilter?.status || "";
  [catFilter, statusFilter].forEach(s => s.addEventListener("change", () => {
    window.STATE._resFilter = { cat: catFilter.value, status: statusFilter.value };
    saveState(); render();
  }));
  filterBar.appendChild(el("label",{},"Category", catFilter));
  filterBar.appendChild(el("label",{},"Status", statusFilter));
  div.appendChild(filterBar);

  // Build list of matches sorted by scheduled date/time, then round
  const schedById = {};
  for (const s of window.STATE.scheduled) schedById[s.match_id] = s;
  const matches = [...window.STATE.matches];
  matches.sort((a,b) => {
    const sa = schedById[a.match_id]; const sb = schedById[b.match_id];
    if (sa && sb) return (sa.date+sa.startMin).localeCompare(sb.date+sb.startMin) || sa.startMin - sb.startMin;
    if (sa) return -1; if (sb) return 1;
    return a.round - b.round;
  });

  const tbl = el("table",{class:"table table-results"});
  tbl.appendChild(el("thead",{}, el("tr",{},
    el("th",{},"Match"), el("th",{},"Cat"), el("th",{},"Stage"),
    el("th",{},"Date/Time/Court"), el("th",{},"Side A"), el("th",{},"Side B"),
    el("th",{},"Winner"), el("th",{},"Status")
  )));
  const tb = el("tbody",{});
  const filt = window.STATE._resFilter || {};
  for (const m of matches) {
    if (filt.cat && m.cat !== filt.cat) continue;
    const aLabel = sideLabelFor(m.cat, m.side_a);
    const bLabel = sideLabelFor(m.cat, m.side_b);
    const win = effectiveWinner(m.match_id);
    const isPending = win === "PENDING";
    const isDecided = win === "A" || win === "B" || win === "BYE";
    if (filt.status === "pending" && !isPending) continue;
    if (filt.status === "done" && !isDecided) continue;
    if (filt.status === "ready") {
      const ready = isPending && aLabel !== `Winner of ${m.side_a.winner_of}` && bLabel !== `Winner of ${m.side_b?.winner_of}`;
      if (!ready) continue;
    }
    const s = schedById[m.match_id];
    const winA = el("button",{class:"btn btn-sm "+(win==="A"?"btn-success":""), onClick:()=>{
      window.STATE.results[m.match_id] = window.STATE.results[m.match_id] === "A" ? null : "A";
      if (!window.STATE.results[m.match_id]) delete window.STATE.results[m.match_id];
      saveState(); render();
    }}, "A wins");
    const winB = el("button",{class:"btn btn-sm "+(win==="B"?"btn-success":""), onClick:()=>{
      window.STATE.results[m.match_id] = window.STATE.results[m.match_id] === "B" ? null : "B";
      if (!window.STATE.results[m.match_id]) delete window.STATE.results[m.match_id];
      saveState(); render();
    }}, "B wins");
    const status = isDecided ? (win === "BYE" ? "BYE" : "Decided") : "Pending";
    tb.appendChild(el("tr",{class: isPending?"pending":"done"},
      el("td",{}, m.match_id),
      el("td",{}, CAT_LABEL[m.cat]),
      el("td",{}, m.stage),
      el("td",{}, s ? `${dateLabel(s.date)} ${mmToHHMM(s.startMin)} · C${s.court}` : "—"),
      el("td",{class: win==="A"?"winner":""}, aLabel),
      el("td",{class: win==="B"?"winner":""}, bLabel),
      el("td",{}, !canEdit() ? el("span", {}, win === "A" ? "A" : win === "B" ? "B" : win === "BYE" ? "BYE" : "—") : el("div",{class:"resbtns"}, winA, winB)),
      el("td",{class: isDecided?"ok":"warn"}, status),
    ));
  }
  tbl.appendChild(tb);
  div.appendChild(tbl);
  return div;
}

// ---------- Leaderboard tab ----------
function renderLeaderboard() {
  const div = el("div", { class: "panel" });
  div.appendChild(el("h2", {}, "Leaderboard"));
  const wins = {};
  for (const p of window.STATE.players) wins[p.id] = 0;
  for (const m of window.STATE.matches) {
    const w = effectiveWinner(m.match_id);
    if (w !== "A" && w !== "B") continue;
    const side = w === "A" ? m.side_a : m.side_b;
    const ids = matchPlayersForResult(m, side);
    ids.forEach(pid => wins[pid] = (wins[pid]||0) + 1);
  }
  const rows = window.STATE.players.map(p => ({
    name: p.name, gender: p.gender, cats: (p.cats||[]).map(c=>CAT_LABEL[CAT_MAP[c]||c]||c).join(", "), wins: wins[p.id]||0
  }));
  rows.sort((a,b) => b.wins - a.wins || a.name.localeCompare(b.name));
  const tbl = el("table",{class:"table"});
  tbl.appendChild(el("thead",{}, el("tr",{},
    el("th",{},"Rank"), el("th",{},"Player"), el("th",{},"Gender"), el("th",{},"Categories"), el("th",{},"Wins")
  )));
  const tb = el("tbody",{});
  rows.forEach((r,i)=>{
    tb.appendChild(el("tr",{},
      el("td",{}, String(i+1)),
      el("td",{}, r.name),
      el("td",{}, r.gender),
      el("td",{}, r.cats),
      el("td",{class:r.wins>0?"ok":""}, String(r.wins))
    ));
  });
  tbl.appendChild(tb);
  div.appendChild(tbl);
  return div;
}

// Returns player ids of the side that won (resolving winner_of chains)
function matchPlayersForResult(match, side) {
  const ids = new Set();
  if (side.type === "entrant") {
    window.STATE.pairings[match.cat][side.idx].forEach(pid => ids.add(pid));
  } else if (side.winner_of) {
    const depWin = effectiveWinner(side.winner_of);
    const dep = window.STATE.matches.find(x => x.match_id === side.winner_of);
    if (dep && (depWin === "A" || depWin === "B")) {
      const depSide = depWin === "A" ? dep.side_a : dep.side_b;
      matchPlayersForResult(dep, depSide).forEach(pid => ids.add(pid));
    }
  }
  return ids;
}

// ---------- Refresh & Excel Export ----------
function refreshAndExport() {
  // Re-generate brackets and schedule from current players/pairings
  if (!Object.keys(window.STATE.pairings).length) {
    window.STATE.pairings = generatePairings();
  }
  generateBracketsAndSchedule();
  saveState();
  render();
  exportToExcel();
}

function exportToExcel() {
  if (typeof XLSX === "undefined") { alert("SheetJS library not loaded. Check internet connection."); return; }
  const wb = XLSX.utils.book_new();

  // --- Sheet 1: Players ---
  const playerRows = [["ID", "Name", "Gender", "Category 1", "Category 2", "Partner Preference"]];
  for (const p of window.STATE.players) {
    const cats = (p.cats || []).map(c => CAT_LABEL[CAT_MAP[c] || c] || c);
    playerRows.push([p.id, p.name, p.gender, cats[0] || "", cats[1] || "", p.partner_pref || ""]);
  }
  const wsPlayers = XLSX.utils.aoa_to_sheet(playerRows);
  wsPlayers["!cols"] = [{wch:5},{wch:22},{wch:8},{wch:18},{wch:18},{wch:25}];
  XLSX.utils.book_append_sheet(wb, wsPlayers, "Players");

  // --- Sheet 2: Pairings ---
  const pairRows = [];
  for (const c of CAT_ORDER) {
    const ents = window.STATE.pairings[c] || [];
    if (!ents.length) continue;
    const isSingles = c === "MS" || c === "WS";
    pairRows.push([CAT_LABEL[c]]);
    pairRows.push(isSingles ? ["#", "Player"] : ["#", "Player 1", "Player 2"]);
    ents.forEach((t, i) => {
      const p1 = pById(t[0]);
      const p2 = t.length > 1 ? pById(t[1]) : null;
      if (isSingles) pairRows.push([i + 1, p1 ? p1.name : "?"]);
      else pairRows.push([i + 1, p1 ? p1.name : "?", p2 ? p2.name : "?"]);
    });
    pairRows.push([]);
  }
  const wsPairings = XLSX.utils.aoa_to_sheet(pairRows);
  wsPairings["!cols"] = [{wch:5},{wch:22},{wch:22}];
  XLSX.utils.book_append_sheet(wb, wsPairings, "Pairings");

  // --- Sheet 3: Schedule ---
  const schedRows = [["Date", "Time", "Court", "Match ID", "Category", "Stage", "Side A", "Side B", "Result"]];
  const schedSorted = [...(window.STATE.scheduled || [])].sort((a, b) =>
    a.date.localeCompare(b.date) || a.startMin - b.startMin || a.court - b.court);
  for (const s of schedSorted) {
    const m = window.STATE.matches.find(x => x.match_id === s.match_id);
    if (!m) continue;
    const aLabel = sideLabelFor(m.cat, m.side_a);
    const bLabel = sideLabelFor(m.cat, m.side_b);
    const win = effectiveWinner(m.match_id);
    const resTxt = win === "PENDING" ? "" : (win === "A" ? aLabel : (win === "B" ? bLabel : "BYE"));
    schedRows.push([
      dateLabel(s.date), mmToHHMM(s.startMin) + "–" + mmToHHMM(s.endMin),
      "Court " + s.court, s.match_id, CAT_LABEL[s.cat], s.stage,
      aLabel, bLabel, resTxt
    ]);
  }
  const wsSched = XLSX.utils.aoa_to_sheet(schedRows);
  wsSched["!cols"] = [{wch:10},{wch:14},{wch:10},{wch:14},{wch:18},{wch:12},{wch:30},{wch:30},{wch:30}];
  XLSX.utils.book_append_sheet(wb, wsSched, "Schedule");

  // --- Sheet 4: Results ---
  const resRows = [["Match ID", "Category", "Stage", "Side A", "Side B", "Winner", "Status"]];
  const matchesSorted = [...window.STATE.matches].sort((a, b) => a.round - b.round || a.match_id.localeCompare(b.match_id));
  for (const m of matchesSorted) {
    const aLabel = sideLabelFor(m.cat, m.side_a);
    const bLabel = sideLabelFor(m.cat, m.side_b);
    const win = effectiveWinner(m.match_id);
    const winLabel = win === "A" ? aLabel : (win === "B" ? bLabel : (win === "BYE" ? "BYE" : ""));
    const status = (win === "A" || win === "B") ? "Decided" : (win === "BYE" ? "BYE" : "Pending");
    resRows.push([m.match_id, CAT_LABEL[m.cat], m.stage, aLabel, bLabel, winLabel, status]);
  }
  const wsResults = XLSX.utils.aoa_to_sheet(resRows);
  wsResults["!cols"] = [{wch:14},{wch:18},{wch:12},{wch:30},{wch:30},{wch:30},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsResults, "Results");

  // --- Sheet 5: Leaderboard ---
  const lbWins = {};
  for (const p of window.STATE.players) lbWins[p.id] = 0;
  for (const m of window.STATE.matches) {
    const w = effectiveWinner(m.match_id);
    if (w !== "A" && w !== "B") continue;
    const side = w === "A" ? m.side_a : m.side_b;
    const pids = matchPlayersForResult(m, side);
    pids.forEach(pid => lbWins[pid] = (lbWins[pid] || 0) + 1);
  }
  const lbData = window.STATE.players.map(p => ({
    name: p.name, gender: p.gender,
    cats: (p.cats || []).map(c => CAT_LABEL[CAT_MAP[c] || c] || c).join(", "),
    wins: lbWins[p.id] || 0
  }));
  lbData.sort((a, b) => b.wins - a.wins || a.name.localeCompare(b.name));
  const lbRows = [["Rank", "Player", "Gender", "Categories", "Wins"]];
  lbData.forEach((r, i) => lbRows.push([i + 1, r.name, r.gender, r.cats, r.wins]));
  const wsLB = XLSX.utils.aoa_to_sheet(lbRows);
  wsLB["!cols"] = [{wch:6},{wch:22},{wch:8},{wch:30},{wch:6}];
  XLSX.utils.book_append_sheet(wb, wsLB, "Leaderboard");

  // Download
  XLSX.writeFile(wb, "Tournament_Schedule_" + new Date().toISOString().slice(0, 10) + ".xlsx");
}

// ---------- View-only viewer export ----------
function exportViewerHTML() {
  const ts = new Date().toLocaleString();
  const stateJson = JSON.stringify(window.STATE);
  let html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  html = html.replace(new RegExp('<div id="app">[\\s\\S]*?<\\/div>\\s*<' + 'script>'), '<div id="app"></div>\n<' + 'script>');
  const inject = '<' + 'script>\nwindow.IS_VIEWER = true;\nwindow.VIEWER_STATE = ' + stateJson + ';\nwindow.VIEWER_SNAPSHOT_AT = ' + JSON.stringify(ts) + ';\n</' + 'script>';
  html = html.replace(/<body([^>]*)>/, '<body$1>\n' + inject);
  const blob = new Blob([html], {type: "text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "tournament_viewer_" + new Date().toISOString().slice(0,10) + ".html";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// ---------- Import / Export ----------
function exportJSON() {
  const blob = new Blob([JSON.stringify(window.STATE, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "tournament_state_" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importJSON() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        if (!obj.players) throw new Error("Missing players");
        window.STATE = obj; saveState(); render();
      } catch (e) { alert("Invalid file: "+e.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

// =========================================================================
// BOOT
// =========================================================================
window.STATE = loadState();
if (!isViewer() && !Object.keys(window.STATE.pairings).length && window.STATE.players.length) {
  window.STATE.pairings = generatePairings();
  generateBracketsAndSchedule();
  saveState();
}
document.addEventListener("DOMContentLoaded", () => { render(); startRemoteSync(); });

</script>
